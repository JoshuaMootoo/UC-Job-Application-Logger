<!-- UC Job Logger — Floating Panel Markup
     This file is fetched by content.js and injected into a shadow DOM.
     It must be a single root element (the outer <div>) — no doctype or <html>.
     All interactivity is wired up in content.js after injection. -->

<div id="uc-logger-panel">

  <!-- ── Header bar (always visible, even when collapsed) ─────────────── -->
  <div class="panel-header">
    <span class="panel-title">Job Logger</span>
    <div class="panel-header-actions">
      <!-- Refresh re-fetches the Google Sheet -->
      <button id="refresh-btn" class="icon-btn" title="Refresh from sheet">&#8635;</button>
      <!-- Toggle collapses/expands the panel body -->
      <button id="panel-toggle" class="icon-btn" title="Collapse / expand">&#8722;</button>
    </div>
  </div>

  <!-- ── Body (hidden when collapsed) ────────────────────────────────── -->
  <div id="panel-body" class="panel-body">

    <!-- Tab bar — content.js wires up clicks and manages the active state -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="APPLIED">Applied</button>
      <button class="tab-btn" data-tab="UNSUCCESSFUL">Unsuccessful</button>
      <button class="tab-btn" data-tab="SUCCESSFUL">Successful</button>
    </div>

    <!-- Universal status button — shown on Unsuccessful / Successful tabs only -->
    <div id="universal-bar" class="universal-bar hidden">
      <button id="universal-set-btn" class="universal-set-btn"></button>
    </div>

    <!-- Application cards are rendered here by content.js -->
    <div id="cards-container" class="cards-container"></div>
  </div>

</div>
